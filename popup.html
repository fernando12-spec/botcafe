<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
    .hidden { display: none; }
    input, button { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    .session-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
    .session-item button { width: auto; margin: 0; padding: 4px 8px; background: #ff4d4d; color: white; border: none; cursor: pointer; }
    .error { color: red; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Cafe Bot - Sessões</h2>

  <div id="auth-section">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Palavra-passe">
    <button id="btn-login">Entrar</button>
    <div id="login-error" class="error"></div>
  </div>

  <div id="dashboard-section" class="hidden">
    <p>Ligado como: <strong id="user-email"></strong></p>
    <h3>Dispositivos Ativos:</h3>
    <div id="sessions-list"></div>
    <button id="btn-logout" style="background: #555; color: white; border: none;">Terminar Sessão Geral</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

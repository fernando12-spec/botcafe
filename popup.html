<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Bot - Controle de Camera</title>
    <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📷 CAFE BOT</h1>
            <p class="subtitle">Enhanced Fake Camera v8.0.21</p>
        </header>

        <div class="status-section">
            <h2>📡 Status</h2>
            <div id="deviceStatus" class="status-box">
                <p class="status-inactive">Nenhum dispositivo ativo</p>
            </div>
        </div>

        <div class="active-devices">
            <h2>🔌 Dispositivos Ativos</h2>
            <div id="devicesList" class="devices-list">
                <p class="no-devices">Carregue midia na pagina para ativar dispositivos</p>
            </div>
        </div>

        <div class="info-section">
            <h3>ℹ️ Informacoes</h3>
            <ul>
                <li>Max. 10 dispositivos por sessao</li>
                <li>Suporta fotos e videos</li>
                <li>Injecao persistente continua</li>
                <li>Suporte a multiplas abas</li>
            </ul>
        </div>

        <footer>
            <button id="clearBtn" class="btn-danger">🗑️ Limpar Tudo</button>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
